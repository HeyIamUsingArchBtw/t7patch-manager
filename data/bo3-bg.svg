<?xml version="1.0" encoding="UTF-8"?>
<!--
  T7Patch Manager — subtle BO3-style backdrop.

  Very soft ambient glow with a few thin warm streaks on near-black.
  Designed to *hint* at the BO3 main menu without competing with the UI.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="900"
     viewBox="0 0 1200 900"
     preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#050301"/>
      <stop offset="0.55" stop-color="#0f0704"/>
      <stop offset="1"    stop-color="#050200"/>
    </linearGradient>

    <linearGradient id="fire" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#ff9a55" stop-opacity="0"/>
      <stop offset="0.25" stop-color="#ff7a30" stop-opacity="0.55"/>
      <stop offset="0.6"  stop-color="#e05010" stop-opacity="0.55"/>
      <stop offset="1"    stop-color="#3a0a02" stop-opacity="0"/>
    </linearGradient>

    <filter id="bloom" x="-100%" y="-10%" width="300%" height="120%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>

    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.85">
      <stop offset="0.4"  stop-color="#000" stop-opacity="0"/>
      <stop offset="1"    stop-color="#000" stop-opacity="0.9"/>
    </radialGradient>
  </defs>

  <!-- Base -->
  <rect width="1200" height="900" fill="url(#base)"/>

  <!-- Only three very soft, wide ambient streaks -->
  <g filter="url(#bloom)" opacity="0.35">
    <rect x="140"  y="-30" width="55" height="960" fill="url(#fire)"/>
    <rect x="620"  y="-30" width="50" height="960" fill="url(#fire)"/>
    <rect x="1020" y="-30" width="60" height="960" fill="url(#fire)"/>
  </g>

  <!-- Sparse embers -->
  <g fill="#ffb570">
    <circle cx="200"  cy="280" r="0.9" opacity="0.55"/>
    <circle cx="470"  cy="180" r="1.0" opacity="0.55"/>
    <circle cx="640"  cy="520" r="0.7" opacity="0.45"/>
    <circle cx="820"  cy="620" r="1.0" opacity="0.55"/>
    <circle cx="990"  cy="360" r="0.8" opacity="0.5"/>
    <circle cx="1050" cy="200" r="0.8" opacity="0.5"/>
  </g>

  <!-- Heavy vignette so edges + centre body stay dark -->
  <rect width="1200" height="900" fill="url(#vignette)"/>
</svg>
