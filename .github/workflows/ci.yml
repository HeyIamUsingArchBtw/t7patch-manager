name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Syntax check
        run: python -m compileall -q src/
      - name: Import core modules (no GTK)
        run: |
          cd src
          python -c "from t7patch_manager import paths, installer, state, config, launcher; print('OK')"
