<?xml version="1.0" encoding="UTF-8"?>
<!--
  T7Patch Manager — BO3-style background.

  Continuous vertical fire streaks on near-black, echoing the BO3 main-menu
  key art. No game assets are used; everything is drawn from scratch.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="900"
     viewBox="0 0 1200 900"
     preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#050301"/>
      <stop offset="0.55" stop-color="#180a04"/>
      <stop offset="1"    stop-color="#050200"/>
    </linearGradient>

    <!-- Fire gradient: bright core down the length, fades at both ends -->
    <linearGradient id="fire" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#ffb055" stop-opacity="0"/>
      <stop offset="0.12" stop-color="#ffb055" stop-opacity="0.65"/>
      <stop offset="0.35" stop-color="#ff7a26" stop-opacity="0.85"/>
      <stop offset="0.65" stop-color="#ff5010" stop-opacity="0.9"/>
      <stop offset="0.88" stop-color="#c02a05" stop-opacity="0.55"/>
      <stop offset="1"    stop-color="#4a0d02" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="-100%" y="-10%" width="300%" height="120%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="bloom" x="-100%" y="-10%" width="300%" height="120%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>

    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.95">
      <stop offset="0.5"  stop-color="#000" stop-opacity="0"/>
      <stop offset="1"    stop-color="#000" stop-opacity="0.75"/>
    </radialGradient>
  </defs>

  <!-- Base -->
  <rect width="1200" height="900" fill="url(#base)"/>

  <!-- Wide soft bloom pass (behind everything, feels like ambient glow) -->
  <g filter="url(#bloom)" opacity="0.45">
    <rect x="100"  y="-30" width="55" height="960" fill="url(#fire)"/>
    <rect x="340"  y="-30" width="70" height="960" fill="url(#fire)"/>
    <rect x="620"  y="-30" width="45" height="960" fill="url(#fire)"/>
    <rect x="880"  y="-30" width="75" height="960" fill="url(#fire)"/>
    <rect x="1080" y="-30" width="50" height="960" fill="url(#fire)"/>
  </g>

  <!-- Sharper mid-layer streaks (curvy paths) -->
  <g filter="url(#glow)" opacity="0.85">
    <path d="M118 -20 Q 105 220 120 450 T 118 920 L 132 920 Q 148 700 128 480 T 132 -20 Z" fill="url(#fire)"/>
    <path d="M362 -20 Q 348 240 365 470 T 362 920 L 378 920 Q 398 720 372 500 T 378 -20 Z" fill="url(#fire)"/>
    <path d="M642 -20 Q 630 220 645 450 T 642 920 L 656 920 Q 672 700 650 480 T 656 -20 Z" fill="url(#fire)"/>
    <path d="M915 -20 Q 898 240 918 470 T 915 920 L 934 920 Q 955 720 926 500 T 934 -20 Z" fill="url(#fire)"/>
    <path d="M1105 -20 Q 1090 220 1108 450 T 1105 920 L 1118 920 Q 1132 700 1114 480 T 1118 -20 Z" fill="url(#fire)"/>
  </g>

  <!-- Bright thin cores -->
  <g stroke-linecap="round">
    <line x1="125" y1="0" x2="125" y2="900" stroke="#ffdca8" stroke-width="1.3" opacity="0.75"/>
    <line x1="370" y1="0" x2="370" y2="900" stroke="#ffdca8" stroke-width="1.1" opacity="0.6"/>
    <line x1="649" y1="0" x2="649" y2="900" stroke="#ffdca8" stroke-width="1.2" opacity="0.65"/>
    <line x1="924" y1="0" x2="924" y2="900" stroke="#ffdca8" stroke-width="1.3" opacity="0.75"/>
    <line x1="1112" y1="0" x2="1112" y2="900" stroke="#ffdca8" stroke-width="1.0" opacity="0.55"/>
  </g>

  <!-- Embers -->
  <g fill="#ffcd85">
    <circle cx="200"  cy="280" r="1.4" opacity="0.7"/>
    <circle cx="290"  cy="720" r="1.1" opacity="0.55"/>
    <circle cx="470"  cy="180" r="1.6" opacity="0.75"/>
    <circle cx="560"  cy="500" r="1.0" opacity="0.6"/>
    <circle cx="740"  cy="140" r="1.3" opacity="0.7"/>
    <circle cx="820"  cy="620" r="1.5" opacity="0.8"/>
    <circle cx="990"  cy="360" r="1.1" opacity="0.6"/>
    <circle cx="220"  cy="540" r="0.9" opacity="0.5"/>
    <circle cx="500"  cy="820" r="1.2" opacity="0.65"/>
    <circle cx="760"  cy="800" r="1.1" opacity="0.55"/>
    <circle cx="1050" cy="200" r="1.0" opacity="0.55"/>
    <circle cx="150"  cy="620" r="1.2" opacity="0.6"/>
  </g>

  <!-- Vignette -->
  <rect width="1200" height="900" fill="url(#vignette)"/>
</svg>
